<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Despesas</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Importando o Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatório</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span>
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <div id="content">
        <h1>Relatório de Despesas</h1>

        <!-- Container para os gráficos -->
        <div id="grafico-container">
            <canvas id="grafico-barras"></canvas>
            <canvas id="grafico-linha"></canvas>
        </div>
    </div>

    <script type="module">
        import { checkAuthState } from './app.js';
        import { gerarGraficoBarras as gerarGraficoBarrasExternos, gerarGraficoLinha as gerarGraficoLinhaExternos } from './graficos.js';
        import { carregarPlanejamentoFirebase, carregarDespesasPendentes } from './app.js'; // Importando funções de carregar dados

        // Função interna para gerar gráfico de barras
        async function gerarGraficoBarras() {
            const ctx = document.getElementById('grafico-barras').getContext('2d');
            
            try {
                const planejamentoDoc = await carregarPlanejamentoFirebase();
                const despesasPendentes = await carregarDespesasPendentes();
                const gastoReal = despesasPendentes.reduce((total, despesa) => total + despesa.valor, 0);
                const abatimento = planejamentoDoc ? planejamentoDoc.valorPlanejado - gastoReal : 0;

                const graficoBarras = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Planejamento', 'Gasto Real', 'Abatimento'],
                        datasets: [{
                            label: 'Despesas',
                            data: [planejamentoDoc ? planejamentoDoc.valorPlanejado : 0, gastoReal, abatimento],
                            backgroundColor: ['rgba(54, 162, 235, 0.2)', 'rgba(255, 99, 132, 0.2)', 'rgba(75, 192, 192, 0.2)'],
                            borderColor: ['rgba(54, 162, 235, 1)', 'rgba(255, 99, 132, 1)', 'rgba(75, 192, 192, 1)'],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("Erro ao carregar dados para gráfico de barras:", error);
            }
        }

        // Função interna para gerar gráfico de linha
        async function gerarGraficoLinha() {
            const ctx = document.getElementById('grafico-linha').getContext('2d');
            
            try {
                const despesasPendentes = await carregarDespesasPendentes();
                const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril']; // Exemplo de meses, substitua se necessário
                const gastosMensais = meses.map((mes) => {
                    return despesasPendentes.filter(despesa => new Date(despesa.dataVencimento).getMonth() === meses.indexOf(mes))
                        .reduce((total, despesa) => total + despesa.valor, 0);
                });

                const graficoLinha = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: meses,
                        datasets: [{
                            label: 'Gastos Mensais',
                            data: gastosMensais,
                            fill: false,
                            borderColor: 'rgba(75, 192, 192, 1)',
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("Erro ao carregar dados para gráfico de linha:", error);
            }
        }

        // Verifica se o usuário está autenticado
        checkAuthState(true).then(() => {
            gerarGraficoBarrasExternos(); // Chama a função importada de graficos.js
            gerarGraficoLinhaExternos();  // Chama a função importada de graficos.js
        }).catch(() => {
            window.location.href = 'index.html'; // Redireciona para a página Home se não estiver logado
        });
    </script>
</body>
</html>
