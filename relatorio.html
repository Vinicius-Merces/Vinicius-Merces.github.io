<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios de Despesas</title>

    <!-- Inclusão do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEJt0cqR4cQGpZ32ts1z5K1Khlz3qQXvYHvS9SKIbbVf5pG7a6LRk8Z3ShwpE" crossorigin="anonymous">

    <!-- Inclusão do Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f4f7fc;
        }

        .card {
            border-radius: 10px;
        }

        .form-container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .card-header {
            background-color: #007bff;
            color: white;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header text-center">
                        <h2>Relatório de Despesas</h2>
                    </div>
                    <div class="card-body">
                        <canvas id="despesaChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

  <!-- Scripts do Bootstrap e Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-firestore.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="app.js"></script>

    <script>
        // Função para gerar o gráfico de despesas
        function generateReport() {
            const user = firebase.auth().currentUser;
            if (user) {
                const despesasRef = firebase.firestore().collection('despesas').doc(user.uid);
                despesasRef.get().then((doc) => {
                    const data = doc.data();
                    const totalGasto = data.despesas.reduce((sum, despesa) => sum + despesa.valor, 0);
                    const planejamento = data.planejamento;

                    // Criar o gráfico com o Chart.js
                    const ctx = document.getElementById('despesaChart').getContext('2d');
                    const despesaChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Planejamento', 'Total Gasto'],
                            datasets: [{
                                label: 'Comparação de Despesas',
                                data: [planejamento, totalGasto],
                                backgroundColor: ['#007bff', '#28a745'],
                                borderColor: ['#0056b3', '#218838'],
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                });
            }
        }

        // Chamar a função para gerar o relatório ao carregar a página
        window.onload = generateReport;
    </script>
</body>

</html>
