<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Despesas</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Importando o Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatório</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span>
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <div id="content">
        <h1>Relatório de Despesas</h1>

        <!-- Container para os gráficos -->
        <div id="grafico-container">
            <canvas id="grafico-barras"></canvas>
            <canvas id="grafico-linha"></canvas>
        </div>
    </div>

    <script type="module">
        import { checkAuthState } from './app.js';
        import { gerarGraficoBarras, gerarGraficoLinha } from './graficos.js';

        // Função que cria o gráfico de barras
        function gerarGraficoBarras() {
            const ctx = document.getElementById('grafico-barras').getContext('2d');
            const graficoBarras = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Planejamento', 'Gasto Real', 'Abatimento'],
                    datasets: [{
                        label: 'Despesas',
                        data: [1000, 800, 200], // Exemplo de valores
                        backgroundColor: ['rgba(54, 162, 235, 0.2)', 'rgba(255, 99, 132, 0.2)', 'rgba(75, 192, 192, 0.2)'],
                        borderColor: ['rgba(54, 162, 235, 1)', 'rgba(255, 99, 132, 1)', 'rgba(75, 192, 192, 1)'],
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // Função que cria o gráfico de linha
        function gerarGraficoLinha() {
            const ctx = document.getElementById('grafico-linha').getContext('2d');
            const graficoLinha = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril'], // Exemplo de meses
                    datasets: [{
                        label: 'Gastos Mensais',
                        data: [150, 300, 200, 400], // Exemplo de dados de gastos
                        fill: false,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // Verifica se o usuário está autenticado
        checkAuthState(true).then(() => {
            gerarGraficoBarras();
            gerarGraficoLinha();
        }).catch(() => {
            window.location.href = 'index.html'; // Redireciona para a página Home se não estiver logado
        });
    </script>
</body>
</html>
