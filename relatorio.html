<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios de Despesas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatórios</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span>
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <div id="content">
        <h1>Relatório de Despesas</h1>
        <div>
            <canvas id="grafico-barras"></canvas>
        </div>
        <div>
            <canvas id="grafico-linha"></canvas>
        </div>
    </div>

    <script type="module">
        import { checkAuthState, exibirGraficoBarras, exibirGraficoLinha, carregarPlanejamento } from './app.js';

        // Verifica se o usuário está logado antes de exibir a página de relatórios
        checkAuthState(true).then(() => {
            carregarPlanejamento();
            exibirGraficoBarras();
            exibirGraficoLinha();
        }).catch(() => {
            window.location.href = "index.html"; // Redireciona para a página de login caso não esteja logado
        });
    </script>
</body>
</html>
