<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Despesas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatório</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span>
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <div id="content">
        <h1>Relatório de Despesas</h1>

        <div id="grafico-container">
            <canvas id="grafico-barras"></canvas>
            <canvas id="grafico-linha"></canvas>
        </div>
    </div>

    <script type="module">
        import { checkAuthState } from './app.js';
        import { gerarGraficoBarras, gerarGraficoLinha } from './graficos.js';

        // Função de logout
        document.getElementById('logout-btn').addEventListener('click', logout);

        // Verifica se o usuário está autenticado
        checkAuthState(true).then(() => {
            gerarGraficoBarras();
            gerarGraficoLinha();
        }).catch(() => {
            window.location.href = "index.html"; // Redireciona se não estiver logado
        });
    </script>
</body>
</html>
