<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatório</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span>
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <div id="content">
        <h1>Gerenciar Despesas</h1>
        <div id="form-despesa">
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" placeholder="Descrição da despesa" required>
            <label for="valor">Valor Total:</label>
            <input type="number" id="valor" placeholder="Valor" required>
            <button id="adicionar-btn">Adicionar Despesa</button>
        </div>

        <div id="despesas-lista">
            <!-- Lista de despesas será carregada aqui -->
        </div>
    </div>

    <script type="module">
        import { checkAuthState, adicionarDespesa, carregarDespesasPendentes } from './app.js';

        document.getElementById('adicionar-btn').addEventListener('click', adicionarDespesa);

        checkAuthState(true).then(user => {
            document.getElementById('user-name').textContent = `Bem-vindo, ${user.email}`;
            carregarDespesasPendentes();
        }).catch(() => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
