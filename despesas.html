<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatório</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span>
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <div id="content">
        <h1>Gerenciar Despesas</h1>
        <div id="loading" style="display:none;">Carregando...</div>

        <div id="form-despesa">
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" placeholder="Descrição da despesa" required>

            <label for="valor">Valor Total:</label>
            <input type="number" id="valor" placeholder="Valor total da despesa" required>

            <label for="data-vencimento">Data de Vencimento:</label>
            <input type="date" id="data-vencimento" required>

            <button id="btn-adicionar">Adicionar Despesa</button>
        </div>

        <ul id="despesas-pendentes"></ul>

        <div id="planejamento">
            <h2>Planejamento de Gastos</h2>
            <label for="valor-planejamento">Valor Planejado:</label>
            <input type="number" id="valor-planejamento" placeholder="Valor total planejado">
            <button id="salvar-planejamento">Salvar Planejamento</button>
            <p id="valor-restante">Valor restante: R$ 0</p>
        </div>
    </div>

    <script type="module">
        import { checkAuthState, adicionarDespesa, carregarDespesasPendentes, carregarPlanejamentoFirebase, logout, salvarPlanejamentoFirebase } from './app.js';

        let valorPlanejado = 0;
        let valorRestante = 0;

        async function carregarPlanejamentoNaPagina() {
            document.getElementById('loading').style.display = 'block'; // Exibe indicador de carregamento
            const valorPlanejadoInput = document.getElementById('valor-planejamento');
            const valorRestanteEl = document.getElementById('valor-restante');
            try {
                const planejamentoDoc = await carregarPlanejamentoFirebase();
                if (planejamentoDoc) {
                    valorPlanejado = planejamentoDoc.valorPlanejado;
                    valorRestante = valorPlanejado;
                    valorRestanteEl.textContent = `Valor restante: R$ ${valorRestante.toFixed(2)}`;
                    valorPlanejadoInput.value = valorPlanejado;
                }
            } catch (error) {
                console.error("Erro ao carregar planejamento:", error);
                alert('Erro ao carregar o planejamento. Tente novamente.');
            } finally {
                document.getElementById('loading').style.display = 'none'; // Oculta indicador de carregamento
            }
        }

        document.getElementById('salvar-planejamento').addEventListener('click', async () => {
            const valorPlanejadoInput = document.getElementById('valor-planejamento').value;
            if (valorPlanejadoInput && !isNaN(valorPlanejadoInput)) {
                valorPlanejado = parseFloat(valorPlanejadoInput);
                valorRestante = valorPlanejado;
                try {
                    await salvarPlanejamentoFirebase(valorPlanejado);
                    document.getElementById('valor-restante').textContent = `Valor restante: R$ ${valorRestante.toFixed(2)}`;
                    alert('Planejamento de gastos salvo com sucesso!');
                } catch (error) {
                    console.error("Erro ao salvar planejamento:", error);
                    alert('Erro ao salvar o planejamento. Tente novamente.');
                }
            } else {
                alert('Por favor, insira um valor válido.');
            }
        });

        document.getElementById("btn-adicionar").addEventListener("click", () => {
            const descricao = document.getElementById('descricao').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const dataVencimento = document.getElementById('data-vencimento').value;
            
            if (descricao && !isNaN(valor) && dataVencimento) {
                adicionarDespesa(descricao, valor, dataVencimento).then(() => {
                    if (valor <= valorRestante) {
                        valorRestante -= valor;
                        document.getElementById('valor-restante').textContent = `Valor restante: R$ ${valorRestante.toFixed(2)}`;
                        salvarPlanejamentoFirebase(valorRestante);
                    } else {
                        alert('Valor da despesa excede o valor restante do planejamento!');
                    }
                }).catch(error => {
                    console.error('Erro ao adicionar despesa:', error);
                    alert('Erro ao adicionar despesa.');
                });
            } else {
                alert('Por favor, preencha todos os campos corretamente.');
            }
        });

        checkAuthState(true).then(() => {
            carregarDespesasPendentes();
            carregarPlanejamentoNaPagina();
        }).catch(() => {
            window.location.href = "index.html";
        });

        document.getElementById('logout-btn').addEventListener('click', logout);
    </script>
</body>
</html>
