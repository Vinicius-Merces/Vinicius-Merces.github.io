<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatórios</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span>
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button>
        </div>
    </nav>

    <div id="content">
        <h1>Gerenciar Despesas</h1>

        <div id="form-despesa">
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" placeholder="Descrição da despesa" required>

            <label for="valor">Valor Total:</label>
            <input type="number" id="valor" placeholder="Valor total da despesa" required>

            <label for="data-vencimento">Data de Vencimento:</label>
            <input type="date" id="data-vencimento" required>

            <button id="btn-adicionar">Adicionar Despesa</button>
        </div>

        <ul id="despesas-pendentes"></ul>
    </div>

    <script type="module">
        import { checkAuthState, carregarDespesasPendentes, adicionarDespesa, logout } from './app.js';

        // Verifica se o usuário está autenticado
        checkAuthState();

        document.getElementById("btn-adicionar").addEventListener("click", () => {
            adicionarDespesa();
        });

        carregarDespesasPendentes();

        document.getElementById("logout-btn")?.addEventListener("click", () => {
            logout();
        });
    </script>
</body>
</html>
