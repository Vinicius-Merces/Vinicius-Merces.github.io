<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>

    <!-- Link para o Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Usar versão do Firebase com script tradicional (não módulo) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <!-- Biblioteca do Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container mt-4">
        <h1>Controle de Despesas</h1>

        <!-- Tela de Login -->
        <div id="login-page">
            <h3>Login</h3>
            <button onclick="login()">Login com Google</button>
        </div>

        <!-- Página de Despesas -->
        <div id="despesas-page" style="display:none;">
            <h3>Planejamento de Despesas</h3>
            <p>Planejamento Total: <span id="planejamento">R$ 0.00</span></p>

            <!-- Botões de ação -->
            <button onclick="addDespesa()" class="btn btn-warning mb-2">Adicionar Despesa</button>
            <button onclick="addPlanejamento()" class="btn btn-info mb-2">Adicionar Planejamento</button>
            <button onclick="logout()" class="btn btn-danger mb-2">Sair</button>

            <div id="despesas-list"></div>
        </div>

        <!-- Gráfico de Relatório -->
        <canvas id="grafico" width="200" height="150"></canvas>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDzxKkfnVgH8AR2w6mrWYtxWhE2puqbCik",
            authDomain: "despesas-f60a3.firebaseapp.com",
            projectId: "despesas-f60a3",
            storageBucket: "despesas-f60a3.firebasestorage.app",
            messagingSenderId: "677878335691",
            appId: "1:677878335691:web:ec41de4f8987e95c28334e",
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Gerenciamento de autenticação
        auth.onAuthStateChanged(user => {
            if (user) {
                // Exibe a página de despesas
                loadDespesas();
                loadRelatorios();
                document.getElementById("despesas-page").style.display = "block";
                document.getElementById("login-page").style.display = "none";
            } else {
                // Exibe a tela de login
                document.getElementById("despesas-page").style.display = "none";
                document.getElementById("login-page").style.display = "block";
            }
        });

        // Função para login
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(result => {
                console.log("Usuário logado:", result.user);
            }).catch(error => {
                console.error("Erro ao fazer login:", error);
            });
        }

        // Função para carregar despesas e planejamento
        function loadDespesas() {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);
            const despesasRef = userRef.collection("despesas");

            // Exibir todas as despesas cadastradas
            despesasRef.get().then(querySnapshot => {
                let despesasList = "";
                querySnapshot.forEach(doc => {
                    const despesa = doc.data();
                    const data = despesa.data;

                    // Verificar se a data é do tipo Timestamp e pode ser convertida para Date
                    let dataFormatada = "Data inválida";
                    if (data && data.toDate) {
                        try {
                            dataFormatada = data.toDate().toLocaleDateString();
                        } catch (error) {
                            console.error("Erro ao formatar a data: ", error);
                        }
                    }

                    // Adicionar o botão "Concluído" apenas se a despesa não for concluída
                    let concluidoButton = '';
                    if (!despesa.concluido) {
                        concluidoButton = `<button class="btn btn-success" onclick="concluirDespesa('${doc.id}', ${despesa.valor})">Concluir</button>`;
                    }

                    despesasList += `
                        <div class="mb-3">
                            <strong>${despesa.nome}</strong><br>
                            Valor: R$ ${despesa.valor.toFixed(2)}<br>
                            Data: ${dataFormatada}<br>
                            ${concluidoButton}
                            <button class="btn btn-danger" onclick="deleteDespesa('${doc.id}')">Excluir</button>
                        </div>
                    `;
                });
                document.getElementById("despesas-list").innerHTML = despesasList;
            }).catch(error => {
                console.error("Erro ao carregar as despesas:", error);
            });

            // Carregar o valor do planejamento
            userRef.get().then(doc => {
                const planejamento = doc.data().planejamento || 0;
                document.getElementById("planejamento").textContent = `R$ ${planejamento.toFixed(2)}`;
            }).catch(error => {
                console.error("Erro ao carregar o planejamento:", error);
            });
        }

        // Função para concluir despesa
        function concluirDespesa(id, valor) {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);
            const despesaRef = userRef.collection("despesas").doc(id);

            // Atualizar a despesa para "concluída"
            despesaRef.update({
                concluido: true
            }).then(() => {
                // Atualizar o valor do planejamento subtraindo a despesa concluída
                const planejamentoRef = userRef.update({
                    planejamento: firebase.firestore.FieldValue.increment(-valor)
                });

                // Recarregar despesas e relatórios após concluir a despesa
                loadDespesas();
                loadRelatorios();
            }).catch(error => alert("Erro ao concluir despesa: " + error.message));
        }

        // Função para carregar o gráfico de relatórios
        function loadRelatorios() {
            const user = auth.currentUser;
            const periodo = parseInt(document.getElementById("periodo").value);
            const userRef = db.collection("users").doc(user.uid);
            const despesasRef = userRef.collection("despesas");

            // Calcula a data de início do filtro com base no período selecionado
            const dataInicio = new Date();
            dataInicio.setDate(dataInicio.getDate() - periodo); // Subtrai o número de dias baseado no filtro

            // Filtra as despesas com base no período
            despesasRef.where("concluido", "==", true)
                .where("data", ">=", dataInicio) // Só despesas depois da data de início
                .get().then(querySnapshot => {
                    const despesasConcluidas = [];
                    querySnapshot.forEach(doc => despesasConcluidas.push(doc.data().valor));

                    // Verifica se o gráfico já existe e o destrói antes de criar um novo
                    const ctx = document.getElementById("grafico").getContext("2d");

                    // Verifica se o gráfico existe antes de tentar destruí-lo
                    if (window.grafico instanceof Chart) {
                        window.grafico.destroy(); // Destrói o gráfico antigo
                    }

                    // Calcula o total das despesas concluídas dentro do período
                    const totalDespesas = despesasConcluidas.reduce((acc, valor) => acc + valor, 0);

                    // Carrega o valor do planejamento
                    userRef.get().then(doc => {
                        const planejamento = doc.data().planejamento || 0;

                        // Criando novo gráfico com as despesas e planejamento
                        window.grafico = new Chart(ctx, {
                            type: "bar", // Tipo de gráfico: barras
                            data: {
                                labels: ["Despesas", "Planejamento"], // Labels para as barras
                                datasets: [{
                                    label: "Valores",
                                    data: [totalDespesas, planejamento], // Dados do gráfico
                                    backgroundColor: ["#4CAF50", "#FF9800"],
                                    borderColor: ["#388E3C", "#F57C00"],
                                    borderWidth: 1
                                }]
                            },
                            options: {
                                scales: {
                                    y: {
                                        beginAtZero: true // Começa o eixo Y no valor 0
                                    }
                                }
                            }
                        });
                    }).catch(error => {
                        console.error("Erro ao carregar o planejamento para gráfico:", error);
                    });
                }).catch(error => {
                    console.error("Erro ao carregar despesas para gráfico:", error);
                });
        }

        // Função para adicionar despesas
        function addDespesa() {
            const nome = prompt("Digite o nome da despesa:");
            const valor = parseFloat(prompt("Digite o valor da despesa:"));
            const user = auth.currentUser;

            if (nome && valor) {
                const userRef = db.collection("users").doc(user.uid);
                userRef.collection("despesas").add({
                    nome,
                    valor,
                    data: new Date(),
                    concluido: false // Define como 'false' por padrão
                }).then(() => {
                    loadDespesas();
                    loadRelatorios();
                }).catch(error => alert("Erro ao adicionar despesa: " + error.message));
            }
        }

        // Função para adicionar planejamento
        function addPlanejamento() {
            const valor = parseFloat(prompt("Digite o valor do planejamento:"));
            const user = auth.currentUser;

            if (valor) {
                const userRef = db.collection("users").doc(user.uid);
                userRef.update({ planejamento: valor })
                    .then(() => {
                        loadDespesas();
                        loadRelatorios();
                    })
                    .catch(error => alert("Erro ao adicionar planejamento: " + error.message));
            }
        }

        // Função para excluir despesa
        function deleteDespesa(id) {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);
            userRef.collection("despesas").doc(id).delete().then(() => {
                loadDespesas();
                loadRelatorios();
            }).catch(error => alert("Erro ao excluir despesa: " + error.message));
        }

        // Função de logout
        function logout() {
            auth.signOut().then(() => {
                alert("Você foi desconectado!");
            }).catch(error => alert("Erro ao deslogar: " + error.message));
        }
    </script>
</body>
</html>
