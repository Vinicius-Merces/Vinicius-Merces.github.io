<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="despesas.html">Despesas</a></li>
            <li><a href="relatorio.html">Relatório</a></li>
        </ul>
        <div id="auth-section">
            <span id="user-name"></span> <!-- Aqui será exibido o nome do usuário -->
            <button id="login-btn">Login</button>
            <button id="create-account-btn">Criar Conta</button>
            <button id="logout-btn" style="display:none;">Logout</button> <!-- Botão de logout -->
        </div>
    </nav>

    <div id="content">
        <h1>Bem-vindo ao Controle de Despesas</h1>
        <p>Por favor, faça login ou crie uma conta para acessar seus dados.</p>
    </div>

    <script type="module">
        import { login, criarConta, checkAuthState, logout } from './app.js';

        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('create-account-btn').addEventListener('click', criarConta);
        document.getElementById('logout-btn').addEventListener('click', logout);

        // Verifica se o usuário está autenticado e altera os botões
        checkAuthState(true).then(user => {
            document.getElementById('user-name').textContent = `Bem-vindo, ${user.email}`;
            document.getElementById('login-btn').style.display = 'none';
            document.getElementById('create-account-btn').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline';
        }).catch(() => {
            document.getElementById('logout-btn').style.display = 'none';
        });
    </script>
</body>
</html>
