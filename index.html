<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas</title>

    <!-- Link para o Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Biblioteca do Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Usar versão do Firebase com script tradicional (não módulo) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body>
    <div class="container mt-4">
        <h1>Controle de Despesas</h1>

        <!-- Área de Login -->
        <div id="login-form" class="mb-4" style="display:none;">
            <h3>Login</h3>
            <input type="email" id="login-email" placeholder="Email" class="form-control mb-2">
            <input type="password" id="login-password" placeholder="Senha" class="form-control mb-2">
            <button onclick="login()" class="btn btn-primary w-100">Entrar</button>
            <button onclick="showSignupForm()" class="btn btn-link w-100">Criar Conta</button>
        </div>

        <!-- Área de Cadastro -->
        <div id="signup-form" class="mb-4" style="display:none;">
            <h3>Criar Conta</h3>
            <input type="email" id="signup-email" placeholder="Email" class="form-control mb-2">
            <input type="password" id="signup-password" placeholder="Senha" class="form-control mb-2">
            <button onclick="signup()" class="btn btn-success w-100">Criar Conta</button>
            <button onclick="showLoginForm()" class="btn btn-link w-100">Já tem uma conta? Entrar</button>
        </div>

        <!-- Página de Despesas -->
        <div id="despesas-page" style="display:none;">
            <h3>Planejamento de Despesas</h3>
            <p>Planejamento Total: <span id="planejamento">R$ 0.00</span></p>

            <!-- Botões de ação -->
            <button onclick="addDespesa()" class="btn btn-warning mb-2">Adicionar Despesa</button>
            <button onclick="addPlanejamento()" class="btn btn-info mb-2">Adicionar Planejamento</button>
            <button onclick="logout()" class="btn btn-danger mb-2">Sair</button>

            <div id="despesas-list"></div>
        </div>

        <!-- Gráfico de Relatório -->
        <canvas id="grafico" width="400" height="150"></canvas>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDzxKkfnVgH8AR2w6mrWYtxWhE2puqbCik",
            authDomain: "despesas-f60a3.firebaseapp.com",
            projectId: "despesas-f60a3",
            storageBucket: "despesas-f60a3.firebasestorage.app",
            messagingSenderId: "677878335691",
            appId: "1:677878335691:web:ec41de4f8987e95c28334e",
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Exemplo de uso do Firebase Auth
        auth.onAuthStateChanged(user => {
            if (user) {
                console.log("Usuário logado:", user);
                loadDespesas();
                loadRelatorios();
                document.getElementById("despesas-page").style.display = "block";
                document.getElementById("login-form").style.display = "none";
                document.getElementById("signup-form").style.display = "none";
            } else {
                document.getElementById("login-form").style.display = "block";
                document.getElementById("signup-form").style.display = "none";
                document.getElementById("despesas-page").style.display = "none";
            }
        });

        function login() {
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;

            if (!email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .catch(error => {
                    alert(error.message);
                });
        }

        function signup() {
            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;

            if (!email || !password) {
                alert("Por favor, preencha todos os campos.");
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .catch(error => {
                    alert(error.message);
                });
        }

        function addDespesa() {
            const user = auth.currentUser;
            const nome = prompt("Nome da Despesa:");
            const valor = parseFloat(prompt("Valor da Despesa:"));
            const categoria = prompt("Categoria:");

            if (!nome || isNaN(valor) || valor <= 0 || !categoria) {
                alert("Por favor, preencha todos os campos corretamente.");
                return;
            }

            const userRef = db.collection("users").doc(user.uid);

            userRef.get().then(doc => {
                const data = doc.data();
                if (!data.planejamento) {
                    alert("Adicione um valor de planejamento antes de registrar despesas.");
                    return;
                }
            });

            userRef.collection("despesas").add({
                nome: nome,
                valor: valor,
                categoria: categoria,
                concluido: false
            })
            .then(() => {
                userRef.update({
                    planejamento: firebase.firestore.FieldValue.increment(-valor)
                });
                alert("Despesa adicionada com sucesso!");
                loadDespesas();
            })
            .catch(error => {
                alert(error.message);
            });
        }

        function loadDespesas() {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);

            userRef.get().then(doc => {
                const data = doc.data();
                const planejamento = data.planejamento || 0;
                document.getElementById("planejamento").innerText = `R$ ${planejamento.toFixed(2)}`;
            });

            userRef.collection("despesas").get().then(querySnapshot => {
                let despesasList = document.getElementById("despesas-list");
                despesasList.innerHTML = "";

                querySnapshot.forEach(doc => {
                    const despesa = doc.data();
                    const despesaItem = document.createElement("div");
                    despesaItem.classList.add("mb-2");
                    despesaItem.innerHTML = `
                        <p><strong>${despesa.nome}</strong> - R$ ${despesa.valor.toFixed(2)} (${despesa.categoria})</p>
                        <button onclick="concluirDespesa('${doc.id}')" class="btn btn-success btn-sm">Concluir</button>
                        <button onclick="removerDespesa('${doc.id}')" class="btn btn-danger btn-sm">Remover</button>
                    `;
                    despesasList.appendChild(despesaItem);
                });
            });
        }

        // Função para concluir uma despesa
function concluirDespesa(despesaId) {
    const user = auth.currentUser;
    const userRef = db.collection("users").doc(user.uid);
    const despesaRef = userRef.collection("despesas").doc(despesaId);

    despesaRef.get().then((doc) => {
        if (doc.exists) {
            despesaRef.update({ concluido: true })
                .then(() => {
                    alert("Despesa concluída!");
                    loadDespesas(); // Atualiza a lista após conclusão
                })
                .catch(error => {
                    alert("Erro ao concluir despesa: " + error.message);
                });
        } else {
            alert("Despesa não encontrada.");
        }
    }).catch(error => {
        alert("Erro ao acessar despesa: " + error.message);
    });
}

// Função para remover uma despesa
function removerDespesa(despesaId) {
    const user = auth.currentUser;
    const userRef = db.collection("users").doc(user.uid);
    const despesaRef = userRef.collection("despesas").doc(despesaId);

    despesaRef.get().then((doc) => {
        if (doc.exists) {
            despesaRef.delete()
                .then(() => {
                    alert("Despesa removida!");
                    loadDespesas(); // Atualiza a lista após remoção
                })
                .catch(error => {
                    alert("Erro ao remover despesa: " + error.message);
                });
        } else {
            alert("Despesa não encontrada.");
        }
    }).catch(error => {
        alert("Erro ao acessar despesa: " + error.message);
    });
}


        function addPlanejamento() {
    const user = auth.currentUser;
    const valor = parseFloat(prompt("Informe o valor do planejamento:"));

    if (isNaN(valor) || valor <= 0) {
        alert("Por favor, insira um valor válido.");
        return;
    }

    const userRef = db.collection("users").doc(user.uid);

    // Verifica se o documento existe
    userRef.get().then(doc => {
        if (!doc.exists) {
            // Cria o documento com o valor do planejamento se ele não existir
            userRef.set({
                planejamento: valor
            }).then(() => {
                alert("Planejamento criado com sucesso!");
                loadDespesas();
            }).catch(error => {
                alert(error.message);
            });
        } else {
            // Atualiza o valor do planejamento se o documento já existir
            userRef.set({
                planejamento: firebase.firestore.FieldValue.increment(valor)
            }, { merge: true })
            .then(() => {
                alert("Planejamento atualizado!");
                loadDespesas();
            })
            .catch(error => {
                alert(error.message);
            });
        }
    }).catch(error => {
        alert("Erro ao acessar o documento do usuário: " + error.message);
    });
}


        function logout() {
            auth.signOut().then(() => {
                alert("Você foi desconectado.");
            });
        }

        function showLoginForm() {
            document.getElementById("login-form").style.display = "block";
            document.getElementById("signup-form").style.display = "none";
        }

        function showSignupForm() {
            document.getElementById("signup-form").style.display = "block";
            document.getElementById("login-form").style.display = "none";
        }

        function loadRelatorios() {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);
            let valores = [];

            userRef.collection("despesas").get().then(querySnapshot => {
                let totalDespesas = 0;

                querySnapshot.forEach(doc => {
                    totalDespesas += doc.data().valor;
                });

                const ctx = document.getElementById('grafico').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Planejamento', 'Gasto Total'],
                        datasets: [{
                            label: 'Planejamento vs Gasto',
                            data: [valores, totalDespesas],
                            backgroundColor: ['rgba(75, 192, 192, 0.2)', 'rgba(255, 99, 132, 0.2)'],
                            borderColor: ['rgba(75, 192, 192, 1)', 'rgba(255, 99, 132, 1)'],
                            borderWidth: 1
                        }]
                    }
                });
            });
        }

    </script>
</body>
</html>
