<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Despesas</title>

    <!-- Link para o Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Usar versão do Firebase com script tradicional (não módulo) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    
    <!-- Biblioteca do Chart.js para gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container mt-4">
        <h1>Controle de Despesas</h1>

        <!-- Área de Login -->
        <div id="login-form" class="mb-4" style="display:none;">
            <h3>Login</h3>
            <input type="email" id="login-email" placeholder="Email" class="form-control mb-2">
            <input type="password" id="login-password" placeholder="Senha" class="form-control mb-2">
            <button onclick="login()" class="btn btn-primary w-100">Entrar</button>
            <button onclick="showSignupForm()" class="btn btn-link w-100">Criar Conta</button>
        </div>

        <!-- Área de Cadastro -->
        <div id="signup-form" class="mb-4" style="display:none;">
            <h3>Criar Conta</h3>
            <input type="email" id="signup-email" placeholder="Email" class="form-control mb-2">
            <input type="password" id="signup-password" placeholder="Senha" class="form-control mb-2">
            <button onclick="signup()" class="btn btn-success w-100">Criar Conta</button>
            <button onclick="showLoginForm()" class="btn btn-link w-100">Já tem uma conta? Entrar</button>
        </div>

        <!-- Página de Despesas -->
        <div id="despesas-page" style="display:none;">
            <h3>Planejamento de Despesas</h3>
            <p>Planejamento Total: <span id="planejamento">R$ 0.00</span></p>

            <!-- Botões de ação -->
            <button onclick="addDespesa()" class="btn btn-warning mb-2">Adicionar Despesa</button>
            <button onclick="addPlanejamento()" class="btn btn-info mb-2">Adicionar Planejamento</button>
            <button onclick="logout()" class="btn btn-danger mb-2">Sair</button>

            <div id="despesas-list"></div>
        </div>

        <!-- Gráfico de Relatório -->
        <canvas id="grafico" width="200" height="150"></canvas>
    </div>

    <script>
        // Configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDzxKkfnVgH8AR2w6mrWYtxWhE2puqbCik",
            authDomain: "despesas-f60a3.firebaseapp.com",
            projectId: "despesas-f60a3",
            storageBucket: "despesas-f60a3.firebasestorage.app",
            messagingSenderId: "677878335691",
            appId: "1:677878335691:web:ec41de4f8987e95c28334e",
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Gerenciamento de autenticação
        auth.onAuthStateChanged(user => {
            if (user) {
                loadDespesas();
                loadRelatorios();
                document.getElementById("despesas-page").style.display = "block";
                document.getElementById("login-form").style.display = "none";
                document.getElementById("signup-form").style.display = "none";
            } else {
                document.getElementById("login-form").style.display = "block";
                document.getElementById("signup-form").style.display = "none";
                document.getElementById("despesas-page").style.display = "none";
            }
        });

        function login() {
            const email = document.getElementById("login-email").value;
            const password = document.getElementById("login-password").value;
            auth.signInWithEmailAndPassword(email, password).catch(error => alert(error.message));
        }

        function signup() {
            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;
            auth.createUserWithEmailAndPassword(email, password).catch(error => alert(error.message));
        }

        function addDespesa() {
            const user = auth.currentUser;
            const nome = prompt("Nome da Despesa:");
            const valor = parseFloat(prompt("Valor da Despesa:"));
            const categoria = prompt("Categoria:");
            if (!nome || isNaN(valor) || valor <= 0 || !categoria) {
                alert("Por favor, preencha todos os campos corretamente.");
                return;
            }
            const userRef = db.collection("users").doc(user.uid);
            userRef.collection("despesas").add({
                nome, valor, categoria, concluido: false
            }).then(() => {
                alert("Despesa adicionada com sucesso!");
                loadDespesas();
                loadRelatorios();
            }).catch(error => alert(error.message));
        }

        function loadDespesas() {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);
            userRef.get().then(doc => {
                const planejamento = doc.data().planejamento || 0;
                document.getElementById("planejamento").innerText = `R$ ${planejamento.toFixed(2)}`;
            });
            userRef.collection("despesas").where("concluido", "==", false).get().then(querySnapshot => {
                let despesasList = document.getElementById("despesas-list");
                despesasList.innerHTML = "";
                querySnapshot.forEach(doc => {
                    const despesa = doc.data();
                    const despesaItem = document.createElement("div");
                    despesaItem.classList.add("mb-2");
                    despesaItem.innerHTML = `
                        <p><strong>${despesa.nome}</strong> - R$ ${despesa.valor.toFixed(2)} (${despesa.categoria})</p>
                        <button onclick="concluirDespesa('${doc.id}', ${despesa.valor})" class="btn btn-success btn-sm">Concluir</button>
                        <button onclick="removerDespesa('${doc.id}')" class="btn btn-danger btn-sm">Remover</button>
                    `;
                    despesasList.appendChild(despesaItem);
                });
            });
        }

        function concluirDespesa(despesaId, valor) {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid);
            const despesaRef = userRef.collection("despesas").doc(despesaId);
            despesaRef.get().then(doc => {
                if (doc.exists && !doc.data().concluido) {
                    userRef.update({ planejamento: firebase.firestore.FieldValue.increment(-valor) }).then(() => {
                        despesaRef.update({ concluido: true }).then(() => {
                            alert("Despesa concluída e valor debitado do planejamento!");
                            loadDespesas(); // Atualiza lista de despesas
                            loadRelatorios(); // Atualiza gráfico
                        });
                    }).catch(error => alert("Erro ao atualizar o planejamento: " + error.message));
                } else alert("Despesa já concluída ou não encontrada.");
            }).catch(error => alert("Erro ao acessar despesa: " + error.message));
            despesaRef.update({ concluido: true })
                .then(() => {
                    alert("Despesa concluída e valor debitado do planejamento!");
                    loadDespesas(); // Atualiza a lista de despesas
                    loadRelatorios(); // Atualiza o gráfico
                });
        }

        function removerDespesa(despesaId) {
            const user = auth.currentUser;
            const despesaRef = db.collection("users").doc(user.uid).collection("despesas").doc(despesaId);
            despesaRef.delete().then(() => {
                alert("Despesa removida com sucesso!");
                loadDespesas(); // Atualiza lista de despesas
                loadRelatorios(); // Atualiza gráfico
            }).catch(error => alert("Erro ao remover despesa: " + error.message));
        }

        function addPlanejamento() {
            const user = auth.currentUser;
            const valor = parseFloat(prompt("Valor do planejamento:"));
            if (isNaN(valor) || valor <= 0) {
                alert("Por favor, insira um valor válido.");
                return;
            }
            const userRef = db.collection("users").doc(user.uid);
            userRef.update({
                planejamento: firebase.firestore.FieldValue.increment(valor)
            }).then(() => {
                alert("Planejamento atualizado!");
                loadDespesas();
                loadRelatorios();
            }).catch(error => alert("Erro ao atualizar planejamento: " + error.message));
        }

        function loadRelatorios() {
            const user = auth.currentUser;
            const userRef = db.collection("users").doc(user.uid).collection("despesas");
            
            // Buscando despesas concluídas
            userRef.where("concluido", "==", true).get().then(querySnapshot => {
                const despesasConcluidas = [];
                querySnapshot.forEach(doc => despesasConcluidas.push(doc.data().valor));
                
                // Verifica se o gráfico já existe e o destrói antes de criar um novo
                const ctx = document.getElementById("grafico").getContext("2d");
                if (window.grafico) {
                    window.grafico.destroy(); // Destrói o gráfico antigo
                }

                // Criando novo gráfico com os dados mais recentes
                window.grafico = new Chart(ctx, {
                    type: "bar", // Tipo de gráfico: barras
                    data: {
                        labels: despesasConcluidas.map((_, i) => `Despesa ${i + 1}`), // Labels para cada despesa
                        datasets: [{
                            label: "Despesas Concluídas",
                            data: despesasConcluidas, // Valores das despesas concluídas
                            backgroundColor: "rgba(75, 192, 192, 0.6)", // Cor das barras
                            borderColor: "rgba(75, 192, 192, 1)", // Cor da borda
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true, // Começa o eixo Y do zero
                                ticks: {
                                    stepSize: 10 // Define o tamanho do incremento no eixo Y
                                }
                            }
                        }
                    }
                });
            }).catch(error => {
                console.error("Erro ao carregar as despesas concluídas:", error);
            });
        }


        function logout() {
            auth.signOut();
        }

        function showSignupForm() {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("signup-form").style.display = "block";
        }

        function showLoginForm() {
            document.getElementById("signup-form").style.display = "none";
            document.getElementById("login-form").style.display = "block";
        }
    </script>
</body>
</html>
